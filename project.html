<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <!-- Карточка товара -->
        <div class="product-card">
            <div class="product-card__image">
                <img src="images/product.jpg" alt="Товар">
            </div>
            <div class="product-card__content">
                <h3 class="product-card__title">пуэр</h3>
                <p class="product-card__description">
                    Китайский продукт снятия стресса и напряжения, забористый напиток
                </p>
                <div class="product-card__footer">
                    <span class="product-card__price">599 ₽</span>
                    <button class="product-card__button">В корзину</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
